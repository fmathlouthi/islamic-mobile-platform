services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tariq-db
    environment:
      POSTGRES_USER: tariq_user
      POSTGRES_PASSWORD: tariq_password
      POSTGRES_DB: tariq_jannah
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/src/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tariq_user -d tariq_jannah"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tariq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

